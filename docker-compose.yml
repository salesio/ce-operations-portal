# CE Mozambique Operations Dashboard — local Docker development
#
# Usage:
#   docker compose up -d
#   docker compose down
#   docker compose down -v   # also wipe Postgres volume
#
# Frontend:  http://localhost:5173
# Postgres:  localhost:5432
# pgAdmin:   http://localhost:5050

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ce_dashboard_frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      # Prefer Docker network hostname for Postgres from inside containers
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://ce_admin:ce_dev_password@postgres:5432/ce_dashboard}
    volumes:
      # Live-edit source on the host (Windows Docker Desktop compatible)
      - .:/app
      # Keep container node_modules (avoid Windows host mount wiping Linux modules)
      - frontend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ce_dashboard_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ce_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-ce_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ce_dev_password}
    ports:
      # Host 5433 avoids clashing with other local Postgres (e.g. VONANA on 5432).
      # Inside Docker the service is still postgres:5432.
      - "5433:5432"
    volumes:
      - ce_dashboard_pgdata:/var/lib/postgresql/data
      # Apply placeholder schema/seed on first boot only
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ce_admin} -d ${POSTGRES_DB:-ce_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ce_dashboard_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ce_dashboard_pgdata:
  frontend_node_modules:
